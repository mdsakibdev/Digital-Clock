<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Clock Project</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ==========================================
         HEADER START
    =========================================== -->

    <header class="header">
      <div class="container">
        <!-- Logo -->

        <div class="logo">
          <h2>Digital Clock</h2>
        </div>

        <!-- Navigation -->

        <nav class="navbar">
          <ul class="nav-list">
            <li><a href="#">Home</a></li>

            <li><a href="#">Clock</a></li>

            <li><a href="#">About</a></li>

            <li><a href="#">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- ==========================================
         HEADER END
    =========================================== -->

    <!-- ==========================================
         MAIN START
    =========================================== -->

    <main>
      <!-- ================= HERO SECTION ================= -->

      <section class="hero">
        <div class="container">
          <!-- Hero Content -->

          <div class="hero-content">
            <h1>Professional Digital Clock</h1>

            <p>Live Time & Date Using JavaScript</p>
          </div>

          <!-- ================= CLOCK CARD ================= -->

          <div class="clock-card">
            <!-- Time -->

            <h2 id="time">00 : 00 : 00</h2>

            <!-- AM / PM -->

            <span id="period"> AM </span>

            <!-- Date -->

            <h3 id="date">01 January 2026</h3>

            <!-- Day -->

            <p id="day">Monday</p>
          </div>
        </div>
      </section>
    </main>

    <!-- ==========================================
         MAIN END
    =========================================== -->

    <!-- ==========================================
         FOOTER START
    =========================================== -->

    <footer class="footer">
      <div class="container">
        <p>© 2026 | Designed By Sakib | Day 07 Project</p>
      </div>
    </footer>

    <!-- ==========================================
         FOOTER END
    =========================================== -->

    <!-- ==========================================
         JAVASCRIPT FILE
    =========================================== -->

    <script src="script.js"></script>
  </body>
</html>
